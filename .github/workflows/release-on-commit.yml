name: Build and Release on every commit

on:
  push:
    branches:
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This permission is strictly required to create a release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build the Go binary
        run: |
          go build -v -o k8s-etcd-decryptor . 

      - name: Get Short Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: commit-${{ steps.vars.outputs.sha_short }}
          name: Release ${{ steps.vars.outputs.sha_short }}
          body: "Automated build for commit ${{ github.sha }}"
          files: k8s-etcd-decryptor 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
